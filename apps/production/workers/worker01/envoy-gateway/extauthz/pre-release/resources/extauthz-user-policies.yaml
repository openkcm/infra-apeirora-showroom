resources:
  extauthz-user-policies:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: extauthz-user-policies
    immutable: false
    data:
      users.cedar: |-
        // Users based on JWT accessing the CMK Backend via the CMK UI
        permit (
          principal is Subject,
          action in [Action::"GET", Action::"POST", Action::"PUT", Action::"PATCH", Action::"DELETE"],
          resource
        ) when {
          context.type == "jwt" &&
          context.path like "/cmk/*" &&
          context.issuer like "*"
        };
        // Users based on JWT accessing the registry Backend
        permit (
          principal is Subject,
          action in [Action::"GET", Action::"POST", Action::"PUT", Action::"PATCH", Action::"DELETE"],
          resource
        ) when {
          context.type == "jwt" &&
          context.path like "/kms.api.cmk.registry.*.v1.Service/*" &&
          context.issuer like "*"
        };
