apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: session-manager--pre-release
spec:
  storageNamespace: services
  targetNamespace: services
  valuesFrom:
    # !! The sequence is important !!
    # Always first **base** and **overlay** (if necessary) later.
    ## base
    - kind: ConfigMap
      name: session-manager-base-pre-release-values
      valuesKey: session-manager-routeref.yaml
