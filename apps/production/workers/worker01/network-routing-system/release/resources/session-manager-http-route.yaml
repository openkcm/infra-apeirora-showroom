resources:
  session-manager-http-route:
    apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: session-manager-http-route
    spec:
      parentRefs:
        - name: ingress-gateway
          namespace: envoy-gateway-system
      hostnames:
        - "ing.worker01.kms.shoot.gardener.cc-one.showroom.apeirora.eu"
      rules:
        - backendRefs:
            - group: ""
              kind: Service
              name: session-manager
              namespace: services
              port: 8080
              weight: 1
          matches:
            - path:
                type: PathPrefix
                value: /sm/auth
            - path:
                type: PathPrefix
                value: /sm/callback
            - path:
                type: PathPrefix
                value: /sm/logout
            - path:
                type: PathPrefix
                value: /sm/bclogout
