resources:
  echoserver-http-route:
    apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: echoserver-http-route
    spec:
      hostnames:
        - "ing.worker01.kms.shoot.gardener.cc-one.showroom.apeirora.eu"
      rules:
        - backendRefs:
            - group: ""
              kind: Service
              name: echoserver-oauth2-proxy
              namespace: services
              port: 4180
              weight: 1
          matches:
            - path:
                type: PathPrefix
                value: /echo
            - path:
                type: PathPrefix
                value: /oauth2
