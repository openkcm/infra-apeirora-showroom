apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
spec:
  targetNamespace: keycloak
  storageNamespace: keycloak
  valuesFrom:
    # !! The sequence is important !!
    # Always first **base** and **overlay** (if necessary) later.
    ## base
    - kind: ConfigMap
      name: keycloak-base-values
      valuesKey: deployment-postgres.yaml
    - kind: ConfigMap
      name: keycloak-base-values
      valuesKey: service-keycloak-discovery.yaml
    - kind: ConfigMap
      name: keycloak-base-values
      valuesKey: service-keycloak.yaml
    - kind: ConfigMap
      name: keycloak-base-values
      valuesKey: service-postgres.yaml
    - kind: ConfigMap
      name: keycloak-base-values
      valuesKey: statefulset-keycloak.yaml
