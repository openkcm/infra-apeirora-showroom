apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: session-manager--pre-release
spec:
  interval: 1m
  releaseName: session-manager--pre-release
  chart:
    spec:
      chart: ./tools/charts/generic
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: -1
      remediateLastFailure: true
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  valuesFrom:
    - kind: ConfigMap
      name: session-manager-base-pre-release-values
      valuesKey: session-manager-routeref.yaml

