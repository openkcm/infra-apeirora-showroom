resources:
  reference-grant-cmk:
    apiVersion: gateway.networking.k8s.io/v1beta1
    kind: ReferenceGrant
    metadata:
      name: cmk-routeref
    spec:
      from:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          namespace: envoy-gateway-system
      to:
        - group: ""
          kind: Service
          name: cmk
