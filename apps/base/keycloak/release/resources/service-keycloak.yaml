resources:
  service-keycloak:
    apiVersion: v1
    kind: Service
    metadata:
      name: keycloak
      namespace: keycloak
      labels:
        app: keycloak
    spec:
      ports:
        - protocol: TCP
          port: 8080
          targetPort: http
          name: http
      selector:
        app: keycloak
      type: ClusterIP
