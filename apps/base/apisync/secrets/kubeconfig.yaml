apiVersion: v1
kind: Secret
metadata:
    name: kubeconfig
    namespace: apisync
type: Opaque
stringData:
    kubeconfig: |
        apiVersion: v1
        clusters:
        - cluster:
            certificate-authority-data: 
            server: https://kcp.api.portal.cc-d2.showroom.apeirora.eu/clusters/root:providers:openkcm-provider
          name: workspace.kcp.io/current
        contexts:
        - context:
            cluster: workspace.kcp.io/current
            user: default-auth
          name: workspace.kcp.io/current
        current-context: workspace.kcp.io/current
        kind: Config
        preferences: {}
        users:
        - name: default-auth
          user:
            client-certificate-data: 
            client-key-data: 
