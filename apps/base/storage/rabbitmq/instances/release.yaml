apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rabbitmq--post-release
spec:
  interval: 1m
  releaseName: rabbitmq--post-release
  storageNamespace: services
  targetNamespace: services
  chart:
    spec:
      chart: ./tools/charts/generic
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: -1
      remediateLastFailure: true
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  dependsOn:
    - name: rabbitmq
    - name: rabbitmq--pre-release
  values:
    resources:
      kms-rabbitmqcluster:
        apiVersion: rabbitmq.com/v1beta1
        kind: RabbitmqCluster
        metadata:
          name: kms-rabbitmqcluster
          namespace: services
        spec:
          replicas: 1
          tls:
            secretName: rabbitmq-tls-secret
            caSecretName: rabbitmq-ca-secret
          rabbitmq:
            additionalConfig: |
              auth_mechanisms.1 = PLAIN
              auth_mechanisms.2 = AMQPLAIN
              ssl_options.fail_if_no_peer_cert = true
