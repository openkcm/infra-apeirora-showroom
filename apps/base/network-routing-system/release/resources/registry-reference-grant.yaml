resources:
  registry-reference-grant:
    apiVersion: gateway.networking.k8s.io/v1beta1
    kind: ReferenceGrant
    metadata:
      name: registry-routeref
      namespace: services
    spec:
      from:
        - group: gateway.networking.k8s.io
          kind: GRPCRoute
          namespace: envoy-gateway-system
      to:
        - group: ""
          kind: Service
          name: registry